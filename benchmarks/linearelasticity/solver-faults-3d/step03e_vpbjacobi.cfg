[pylithapp.metadata]
arguments = [step03_vpbjacobi.cfg, step03e_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03e_vpbjacobi

[pylithapp.petsc]
log_view = :logs/step03e_vpbjacobi.py:ascii_info_detail

[pylithapp.problem.mesh_initializer.phases.refine_mesh]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 4
[pylithapp.problem.mesh_initializer.phases.read_mesh]
reader.filename = mesh_tet0156.msh

[pylithapp.problem.scales]
length_scale = 0.156*km
displacement_scale = 0.156*km

[pylithapp.petsc]
ksp_atol = 64.0e-11
snes_atol = 256.0e-11
