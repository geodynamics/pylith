[pylithapp.metadata]
arguments = [step03_vpbjacobi.cfg, step03c_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03c_vpbjacobi

[pylithapp.petsc]
log_view = :logs/step03c_vpbjacobi.py:ascii_info_detail

[pylithapp.mesh_generator]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 2
reader.filename = mesh_tet0625.msh

[pylithapp.problem.scales]
length_scale = 0.625*km
displacement_scale = 0.625*km

[pylithapp.petsc]
ksp_atol = 1.0e-12
snes_atol = 64.0e-11
