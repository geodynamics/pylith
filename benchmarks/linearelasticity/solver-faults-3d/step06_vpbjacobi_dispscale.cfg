[pylithapp.metadata]
arguments = [step06_vpbjacobi_dispscale.cfg]

[pylithapp.problem]
defaults.name = step06a_vpbjacobi_dispscale

[pylithapp.petsc]
log_view = :logs/step06a_vpbjacobi_dispscale.py:ascii_info_detail
