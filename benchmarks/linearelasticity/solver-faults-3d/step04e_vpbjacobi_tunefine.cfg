[pylithapp.metadata]
arguments = [step04_vpbjacobi_tunefine.cfg, step04e_vpbjacobi_tunefine.cfg]

[pylithapp.problem]
defaults.name = step04e_vpbjacobi_tunefine

[pylithapp.petsc]
log_view = :logs/step04e_vpbjacobi_tunefine.py:ascii_info_detail

[pylithapp.problem.mesh_initializer.phases.refine_mesh]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 4
[pylithapp.problem.mesh_initializer.phases.read_mesh]
reader.filename = mesh_tet0156.msh

[pylithapp.problem.scales]
length_scale = 0.156*km
displacement_scale = 0.156*km

[pylithapp.petsc]
ksp_atol = 64.0e-11
snes_atol = 256.0e-11
