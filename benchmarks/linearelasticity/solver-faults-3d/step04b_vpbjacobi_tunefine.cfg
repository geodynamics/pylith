[pylithapp.metadata]
arguments = [step04_vpbjacobi_tunefine.cfg, step04b_vpbjacobi_tunefine.cfg]

[pylithapp.problem]
defaults.name = step04b_vpbjacobi_tunefine

[pylithapp.petsc]
log_view = :logs/step04b_vpbjacobi_tunefine.py:ascii_info_detail

[pylithapp.mesh_generator]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 1
reader.filename = mesh_tet1250.msh

[pylithapp.problem.scales]
length_scale = 1.25*km
displacement_scale = 1.25*km

[pylithapp.petsc]
ksp_atol = 8.0e-11
snes_atol = 32.0e-11
