[pylithapp.metadata]
arguments = [step03_vpbjacobi.cfg, step03b_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03b_vpbjacobi

[pylithapp.petsc]
log_view = :logs/step03b_vpbjacobi.py:ascii_info_detail

[pylithapp.mesh_generator]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 1
reader.filename = mesh_tet1250.msh

[pylithapp.problem.scales]
length_scale = 1.25*km
displacement_scale = 1.25*km

[pylithapp.petsc]
ksp_atol = 8.0e-11
snes_atol = 32.0e-11
