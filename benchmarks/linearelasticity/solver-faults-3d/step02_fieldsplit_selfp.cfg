[pylithapp.metadata]
description = Benchmark for linear elasticity with 3D strike-slip faults with field split preconditioner with selfp lower factorization.
base = [pylithapp.cfg]
arguments = [step02_fieldsplit_selfp.cfg]

[pylithapp.problem]
defaults.name = step02a_fieldsplit_selfp

[pylithapp.problem.scales]
length_scale = 2.5*km
displacement_scale = 2.5*km

[pylithapp.problem.petsc_defaults]
solver = False

[pylithapp.petsc]
pc_type = fieldsplit
pc_use_amat = true
pc_fieldsplit_type = schur

pc_fieldsplit_schur_factorization_type = lower
pc_fieldsplit_schur_precondition = selfp
pc_fieldsplit_schur_scale = 1.0

fieldsplit_displacement_ksp_type = preonly
fieldsplit_displacement_pc_type = ml

fieldsplit_lagrange_multiplier_fault_ksp_type = preonly
fieldsplit_lagrange_multiplier_fault_pc_type = ml

ksp_atol = 4.0e-11
snes_atol = 16.0e-11

[pylithapp.metadata]
arguments = [step02_fieldsplit_selfp.cfg]

[pylithapp.problem]
defaults.name = step02a_fieldsplit_selfp

[pylithapp.petsc]
log_view = :logs/step02a_fieldsplit_selfp.py:ascii_info_detail
