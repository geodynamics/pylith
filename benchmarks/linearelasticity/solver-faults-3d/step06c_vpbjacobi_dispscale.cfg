[pylithapp.metadata]
arguments = [step06_vpbjacobi_dispscale.cfg, step06c_vpbjacobi_dispscale.cfg]

[pylithapp.problem]
defaults.name = step06c_vpbjacobi_dispscale

[pylithapp.petsc]
log_view = :logs/step06c_vpbjacobi_dispscale.py:ascii_info_detail

[pylithapp.problem.mesh_initializer.phases.refine_mesh]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 2
[pylithapp.problem.mesh_initializer.phases.read_mesh]
reader.filename = mesh_tet0625.msh

[pylithapp.problem.scales]
length_scale = 0.625*km
