[pylithapp.metadata]
arguments = [step05_vpbjacobi_tunecoarse.cfg, step05b_vpbjacobi_tunecoarse.cfg]

[pylithapp.problem]
defaults.name = step05b_vpbjacobi_tunecoarse

[pylithapp.petsc]
log_view = :logs/step05b_vpbjacobi_tunecoarse.py:ascii_info_detail

[pylithapp.problem.mesh_initializer.phases.refine_mesh]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 1
[pylithapp.problem.mesh_initializer.phases.read_mesh]
reader.filename = mesh_tet1250.msh

[pylithapp.problem.scales]
length_scale = 1.25*km
displacement_scale = 1.25*km

[pylithapp.petsc]
ksp_atol = 8.0e-11
snes_atol = 32.0e-11
