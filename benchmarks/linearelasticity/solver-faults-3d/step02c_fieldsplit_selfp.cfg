[pylithapp.metadata]
arguments = [step02_fieldsplit_selfp.cfg, step02c_fieldsplit_selfp.cfg]

[pylithapp.problem]
defaults.name = step02c_fieldsplit_selfp

[pylithapp.petsc]
log_view = :logs/step02c_fieldsplit_selfp.py:ascii_info_detail

[pylithapp.problem.mesh_initializer.phases.refine_mesh]
#refiner = pylith.topology.RefineUniform
#refiner.levels = 2
[pylithapp.problem.mesh_initializer.phases.read_mesh]
reader.filename = mesh_tet0625.msh

[pylithapp.problem.scales]
length_scale = 0.625*km
displacement_scale = 0.625*km

[pylithapp.petsc]
ksp_atol = 1.0e-11
snes_atol = 64.0e-11
