[pylithapp.metadata]
arguments = [step02_fieldsplit_selfp.cfg, step02c_fieldsplit_selfp.cfg]

[pylithapp.problem]
defaults.name = step02c_fieldsplit_selfp

[pylithapp.petsc]
log_view = :logs/step02c_fieldsplit_selfp.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 2

[pylithapp.problem.scales]
length_scale = 0.25*km
displacement_scale = 0.25*km

[pylithapp.petsc]
ksp_atol = 1.0e-10
snes_atol = 16.0e-10
