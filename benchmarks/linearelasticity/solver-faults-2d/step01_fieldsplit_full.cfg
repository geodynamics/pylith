[pylithapp.metadata]
description = Benchmark for linear elasticity with 3D strike-slip faults with field split preconditioner with full lower factorization.
base = [pylithapp.cfg]
arguments = [step01_fieldsplit_full.cfg]

[pylithapp.problem]
defaults.name = step01a_fieldsplit_full

[pylithapp.problem.scales]
length_scale = 2.5*km
displacement_scale = 2.5*km

[pylithapp.problem.petsc_defaults]
solver = False

[pylithapp.petsc]
pc_type = fieldsplit
pc_use_amat = true
pc_fieldsplit_type = schur

pc_fieldsplit_schur_factorization_type = lower
pc_fieldsplit_schur_precondition = full

fieldsplit_displacement_pc_type = ilu
fieldsplit_lagrange_multiplier_fault_pc_type = ilu

ksp_atol = 1.0e-12
snes_atol = 1.0e-10

[pylithapp.metadata]
arguments = [step01_fieldsplit_full.cfg]

[pylithapp.problem]
defaults.name = step01a_fieldsplit_full

[pylithapp.petsc]
log_view = :logs/step01a_fieldsplit_full.py:ascii_info_detail
