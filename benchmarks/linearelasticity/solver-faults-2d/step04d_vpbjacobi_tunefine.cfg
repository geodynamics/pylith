[pylithapp.metadata]
arguments = [step04_vpbjacobi_tunefine.cfg, step04d_vpbjacobi_tunefine.cfg]

[pylithapp.problem]
defaults.name = step04d_vpbjacobi_tunefine

[pylithapp.petsc]
log_view = :logs/step04d_vpbjacobi_tunefine.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 3

[pylithapp.problem.scales]
length_scale = 0.125*km
displacement_scale = 0.125*km

[pylithapp.petsc]
ksp_atol = 8.0e-10
snes_atol = 32.0e-10
