[pylithapp.metadata]
arguments = [step03_vpbjacobi.cfg, step03d_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03d_vpbjacobi

[pylithapp.petsc]
log_view = :logs/step03d_vpbjacobi.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 3

[pylithapp.problem.scales]
length_scale = 0.125*km
displacement_scale = 0.125*km

[pylithapp.petsc]
ksp_atol = 1.0e-12
snes_atol = 32.0e-10
