[pylithapp.metadata]
arguments = [step06_vpbjacobi_dispscale.cfg, step06e_vpbjacobi_dispscale.cfg]

[pylithapp.problem]
defaults.name = step06e_vpbjacobi_dispscale

[pylithapp.petsc]
log_view = :logs/step06e_vpbjacobi_dispscale.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 4

[pylithapp.problem.scales]
length_scale = 0.0625*km
