[pylithapp.metadata]
arguments = [step06_vpbjacobi_dispscale.cfg, step06d_vpbjacobi_dispscale.cfg]

[pylithapp.problem]
defaults.name = step06d_vpbjacobi_dispscale

[pylithapp.petsc]
log_view = :logs/step06d_vpbjacobi_dispscale.py:ascii_info_detail

[pylithapp.problem.mesh_initializer.phases.refine_mesh]
refiner.levels = 3

[pylithapp.problem.scales]
length_scale = 0.125*km
