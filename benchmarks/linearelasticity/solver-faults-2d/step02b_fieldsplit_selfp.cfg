[pylithapp.metadata]
arguments = [step02_fieldsplit_selfp.cfg, step02b_fieldsplit_selfp.cfg]

[pylithapp.problem]
defaults.name = step02b_fieldsplit_selfp

[pylithapp.petsc]
log_view = :logs/step02b_fieldsplit_selfp.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 1

[pylithapp.problem.scales]
length_scale = 0.5*km
displacement_scale = 0.5*km

[pylithapp.petsc]
ksp_atol = 2.0e-10
snes_atol = 8.0e-10
