[pylithapp.metadata]
description = Benchmark for linear elasticity with 3D strike-slip faults with variable point block Jacobi preconditioner and tuning at the fine level.
base = [pylithapp.cfg]
arguments = [step04_vpbjacobi_tunefine.cfg]

[pylithapp.problem]
defaults.name = step04a_vpbjacobi_tunefine

[pylithapp.problem.scales]
length_scale = 1.0*km
displacement_scale = 1.0*km

[pylithapp.problem.petsc_defaults]
solver = False

[pylithapp.petsc]
pc_type = gamg

dm_reorder_section = True
dm_reorder_section_type = cohesive
mg_fine_pc_type = vpbjacobi
ksp_gmres_restart = 100

mg_fine_ksp_max_it = 5

ksp_atol = 1.0e-10
snes_atol = 4.0e-10


[pylithapp.metadata]
arguments = [step04_vpbjacobi_tunefine.cfg]

[pylithapp.problem]
defaults.name = step04a_vpbjacobi_tunefine

[pylithapp.petsc]
log_view = :logs/step04a_vpbjacobi_tunefine.py:ascii_info_detail
