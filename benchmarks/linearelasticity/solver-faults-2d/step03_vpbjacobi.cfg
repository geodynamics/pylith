[pylithapp.metadata]
description = Benchmark for linear elasticity with 3D strike-slip faults with variable point block Jacobi preconditioner.
base = [pylithapp.cfg]
arguments = [step03_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03a_vpbjacobi

[pylithapp.problem.scales]
length_scale = 1.0*km
displacement_scale = 1.0*km

[pylithapp.problem.petsc_defaults]
solver = False

[pylithapp.petsc]
pc_type = gamg

dm_reorder_section = True
dm_reorder_section_type = cohesive

mg_fine_pc_type = vpbjacobi
ksp_gmres_restart = 100

ksp_atol = 1.0e-10
snes_atol = 4.0e-10

[pylithapp.metadata]
arguments = [step03_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03a_vpbjacobi

[pylithapp.petsc]
log_view = :logs/step03a_vpbjacobi.py:ascii_info_detail
