[pylithapp.metadata]
arguments = [step03_vpbjacobi.cfg, step03e_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03e_vpbjacobi

[pylithapp.petsc]
log_view = :logs/step03e_vpbjacobi.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 4

[pylithapp.problem.scales]
length_scale = 0.0625*km
displacement_scale = 0.0625*km

[pylithapp.petsc]
ksp_atol = 1.0e-10
snes_atol = 64.0e-10
