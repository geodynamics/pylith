[pylithapp.metadata]
arguments = [step04_vpbjacobi_tunefine.cfg, step04e_vpbjacobi_tunefine.cfg]

[pylithapp.problem]
defaults.name = step04e_vpbjacobi_tunefine

[pylithapp.petsc]
log_view = :logs/step04e_vpbjacobi_tunefine.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 4

[pylithapp.problem.scales]
length_scale = 0.0625*km
displacement_scale = 0.0625*km

[pylithapp.petsc]
ksp_atol = 16.0e-10
snes_atol = 64.0e-10
