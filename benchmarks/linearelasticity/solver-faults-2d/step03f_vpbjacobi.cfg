[pylithapp.metadata]
arguments = [step03_vpbjacobi.cfg, step03f_vpbjacobi.cfg]

[pylithapp.problem]
defaults.name = step03f_vpbjacobi

[pylithapp.petsc]
log_view = :logs/step03f_vpbjacobi.py:ascii_info_detail

[pylithapp.problem.mesh_initializer.phases.refine_mesh]
refiner.levels = 5

[pylithapp.problem.scales]
length_scale = 0.03125*km
displacement_scale = 0.03125*km

[pylithapp.petsc]
ksp_atol = 1.0e-11
snes_atol = 128.0e-10
