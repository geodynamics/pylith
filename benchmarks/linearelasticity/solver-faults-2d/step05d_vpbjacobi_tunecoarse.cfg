[pylithapp.metadata]
arguments = [step05_vpbjacobi_tunecoarse.cfg, step05d_vpbjacobi_tunecoarse.cfg]

[pylithapp.problem]
defaults.name = step05d_vpbjacobi_tunecoarse

[pylithapp.petsc]
log_view = :logs/step05d_vpbjacobi_tunecoarse.py:ascii_info_detail

[pylithapp.mesh_generator]
refiner = pylith.topology.RefineUniform
refiner.levels = 3

[pylithapp.problem.scales]
length_scale = 0.125*km
displacement_scale = 0.125*km

[pylithapp.petsc]
ksp_atol = 8.0e-10
snes_atol = 32.0e-10
