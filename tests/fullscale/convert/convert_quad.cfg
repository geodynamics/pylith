[convertmeshapp]
mesh_initializer = pylith.initializers.Convert

[convertmeshapp.mesh_initializer.phases.read_mesh]
reader = pylith.meshio.MeshIOAscii
reader.filename = quad_small.mesh

[convertmeshapp.mesh_initializer.phases.write_mesh]
writer = pylith.meshio.MeshIOPetsc
writer.filename = quad_small.h5

